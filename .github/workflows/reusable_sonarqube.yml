name: Reusable SonarCloud Analysis

# --------------------------------------------------------------------------
# This workflow only runs when explicitly called by another workflow.
# --------------------------------------------------------------------------
on:
  workflow_call:
    inputs:
      sonar_organization:
        required: true
        type: string
        description: 'The SonarCloud organization key (e.g., rh-psce).'
      sonar_project_key:
        required: true    # Make this mandatory for clarity
        type: string
        description: 'The SonarCloud project key (e.g., rh-psce_complyctl).'
      coverage_artifact_name:
        required: false   # Optional, as some repos might not have coverage
        type: string
        default: coverage
        description: 'The name of the coverage artifact that was uploaded by the caller (e.g., coverage).'
      coverage_file_path:
        required: false   # Optional, as some repos might not have coverage
        type: string
        description: 'The path to the generated coverage file (e.g., coverage.out).'
      language_scanner_property:
        required: false
        type: string
        description: 'The Sonar Scanner property for coverage, e.g., sonar.typescript.lcov.reportPaths.'
      workflow_run_id:
        required: false
        type: string
        description: 'The workflow run ID to download artifacts from (for workflow_run pattern).'
      pr_number:
        required: false
        type: string
        description: 'The pull request number (for workflow_run pattern).'
      pr_head_sha:
        required: false
        type: string
        description: 'The pull request head SHA (for workflow_run pattern).'
      pr_head_ref:
        required: false
        type: string
        description: 'The pull request head ref (for workflow_run pattern).'
      pr_head_repo:
        required: false
        type: string
        description: 'The pull request head repository full name (for workflow_run pattern with forks).'
    secrets:
      SONAR_TOKEN:
        required: true
        description: 'The SonarCloud analysis token.'
      source_token:
        required: true
        description: 'GitHub Token'

permissions:
  contents: none
  issues: none
  pull-requests: none

jobs:
  sonar_analysis:
    name: Analyze with SonarCloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.pr_head_repo || github.repository }}
          ref: ${{ inputs.pr_head_sha || github.sha }}
          fetch-depth: 0 # This may also capture vulnerabilities unrelated to the PR.

      - name: Download coverage file from workflow_run
        if: ${{ inputs.coverage_file_path != '' && inputs.workflow_run_id != '' }}
        env:
          GH_TOKEN: ${{ secrets.source_token }}
          COVERAGE_ARTIFACT_NAME: "${{ inputs.coverage_artifact_name }}"
        run: |
          gh run download ${{ inputs.workflow_run_id }} -n "$COVERAGE_ARTIFACT_NAME" -D .

      - name: Download coverage file from current run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ inputs.coverage_file_path != '' && inputs.workflow_run_id == '' }}
        env:
          COVERAGE_ARTIFACT_NAME: "${{ inputs.coverage_artifact_name }}"
          COVERAGE_FILE_PATH: "${{ inputs.coverage_file_path }}"
        with:
          name: ${{ env.COVERAGE_ARTIFACT_NAME }}
          path: ${{ env.COVERAGE_FILE_PATH }}

      # The calling workflow MUST ensure the coverage file exists before calling this.
      # This step just runs the SonarCloud analysis with the provided inputs.
      # Inject dynamic coverage properties only if path is provided
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.source_token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ inputs.sonar_organization }}
          SONAR_PROJECT_KEY: ${{ inputs.sonar_project_key }}
          COVERAGE_FILE_PATH: ${{ inputs.coverage_file_path }}
          LANGUAGE_SCANNER_PROPERTY: ${{ inputs.language_scanner_property }}
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          projectBaseDir: ${{ github.workspace }} # Ensure scan starts at the repo root
          args: >
            "-Dsonar.organization=${{ env.SONAR_ORGANIZATION }}"
            "-Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}"
            "-Dsonar.qualitygate.wait=true"
            "${{ env.COVERAGE_FILE_PATH && format('-D{0}={1}', env.LANGUAGE_SCANNER_PROPERTY, env.COVERAGE_FILE_PATH) || '' }}"
            "${{ env.PR_NUMBER && format('-Dsonar.pullrequest.key={0}', env.PR_NUMBER) || '' }}"
